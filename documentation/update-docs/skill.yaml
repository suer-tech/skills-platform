id: documentation.update-docs

name: Update Documentation

version: 0.1.0

category: documentation

description: >
  Анализирует текущее состояние проекта и обновляет
  документацию, созданную скиллом new-project.

author: skills-platform

inputs:

  project_path:
    required: true
    description: Путь к проекту

outputs:

  summary:
    type: yaml
    description: Что было изменено

capabilities:

  - code_analysis
  - documentation_update
